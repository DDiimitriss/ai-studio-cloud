<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
    <title>Qwen AI Studio - Streaming Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f8fafc;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.2s;
        }
        body.dark { background: #0f172a; color: #e2e8f0; }
        .top-bar {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        body.dark .top-bar { background: #0f172a; border-bottom: 1px solid #334155; }
        .tool-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            align-items: center;
        }
        .tool-btn, .export-btn, .model-select, .theme-toggle {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 2rem;
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }
        body.dark .tool-btn, body.dark .export-btn, body.dark .model-select, body.dark .theme-toggle {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
        }
        .tool-btn:hover, .export-btn:hover, .theme-toggle:hover { background: #e2e8f0; border-color: #3b82f6; }
        .export-buttons { display: flex; gap: 0.4rem; margin-left: auto; margin-right: 0.5rem; }
        .model-select { background: #e2e8f0; }
        .theme-toggle { background: none; width: 2rem; justify-content: center; }
        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #fff;
            border-radius: 1rem;
            width: 700px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        body.dark .modal-content { background: #1e293b; color: #e2e8f0; }
        .modal-close { float: right; cursor: pointer; font-size: 1.2rem; }
        .plugin-list, .memory-list, .skill-list { margin: 1rem 0; max-height: 400px; overflow-y: auto; }
        .plugin-item, .skill-item, .memory-item {
            background: #f1f5f9;
            border-radius: 0.5rem;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        body.dark .plugin-item, body.dark .skill-item, body.dark .memory-item { background: #0f172a; }
        .add-skill { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .add-skill input, .add-skill textarea { padding: 0.4rem; border-radius: 0.5rem; border: 1px solid #cbd5e1; }
        /* Chat */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            overflow: hidden;
        }
        body.dark .chat-container { background: #0f172a; }
        .drag-over { border: 2px dashed #3b82f6 !important; background-color: rgba(59,130,246,0.05); }
        .chat-header { padding: 1rem 2rem; border-bottom: 1px solid #e2e8f0; background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); }
        .chat-header h2 { font-size: 1.2rem; font-weight: 500; }
        .messages { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 1rem; }
        .message { display: flex; gap: 1rem; max-width: 85%; animation: fadeIn 0.2s ease; position: relative; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.ai { align-self: flex-start; }
        .message-avatar {
            width: 36px; height: 36px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }
        body.dark .message-avatar { background: #1e293b; }
        .message.user .message-avatar { background: #3b82f6; color: white; }
        .message-content {
            background: #f1f5f9; padding: 0.75rem 1rem; border-radius: 1.5rem; line-height: 1.5; font-size: 0.9rem; color: #1e293b; white-space: pre-wrap; word-break: break-word;
        }
        body.dark .message-content { background: #1e293b; color: #e2e8f0; }
        .message.user .message-content { background: #3b82f6; color: white; }
        .delete-msg, .copy-msg-btn, .retry-msg-btn, .speak-msg-btn {
            background: none; border: none; cursor: pointer; font-size: 0.8rem; padding: 0 0.3rem; margin-left: 0.5rem; opacity: 0.5;
        }
        .delete-msg { color: #ef4444; }
        .copy-msg-btn { color: #94a3b8; }
        .retry-msg-btn { color: #f59e0b; }
        .speak-msg-btn { color: #10b981; }
        .delete-msg:hover, .copy-msg-btn:hover, .retry-msg-btn:hover, .speak-msg-btn:hover { opacity: 1; }
        .input-area { padding: 1rem 2rem; background: #fff; border-top: 1px solid #e2e8f0; position: relative; }
        body.dark .input-area { background: #0f172a; border-top: 1px solid #334155; }
        .input-wrapper {
            display: flex; gap: 0.5rem; background: #f1f5f9; border-radius: 2rem; padding: 0.5rem 0.5rem 0.5rem 1.5rem; border: 1px solid #e2e8f0;
        }
        body.dark .input-wrapper { background: #1e293b; border: 1px solid #334155; }
        .input-wrapper input { flex: 1; background: none; border: none; color: #1e293b; font-size: 0.95rem; outline: none; padding: 0.75rem 0; }
        body.dark .input-wrapper input { color: #e2e8f0; }
        .input-wrapper button { background: #3b82f6; border: none; border-radius: 2rem; padding: 0.5rem 1.2rem; color: white; font-weight: 600; cursor: pointer; }
        .voice-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .mic-btn, .tts-global-btn {
            background: #e2e8f0;
            border: none;
            border-radius: 2rem;
            padding: 0.5rem 0.8rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        body.dark .mic-btn, body.dark .tts-global-btn { background: #334155; color: #e2e8f0; }
        .mic-btn.listening { background: #ef4444; color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .file-upload-wrapper { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .file-upload-label {
            background: #e2e8f0; border-radius: 2rem; padding: 0.5rem 1rem; font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem;
        }
        body.dark .file-upload-label { background: #334155; }
        .file-upload-label input { display: none; }
        .clear-history, .stop-btn {
            background: #e2e8f0; border: none; border-radius: 2rem; padding: 0.5rem 1rem; font-size: 0.8rem; cursor: pointer;
        }
        .clear-history:hover { background: #ef4444; color: white; }
        .stop-btn { background: #ef4444; color: white; margin-left: 0.5rem; }
        .token-info { font-size: 0.7rem; color: #64748b; margin-top: 0.2rem; text-align: right; }
        .autocomplete-items {
            position: absolute; bottom: 100%; left: 1rem; right: 1rem; background: #fff; border: 1px solid #cbd5e1; border-radius: 0.5rem; max-height: 200px; overflow-y: auto; z-index: 1000; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 0.25rem;
        }
        body.dark .autocomplete-items { background: #1e293b; border-color: #334155; }
        .autocomplete-item { padding: 0.5rem 1rem; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid #e2e8f0; }
        .autocomplete-item:hover, .autocomplete-item.selected { background: #e2e8f0; }
        .clone-preview-panel {
            margin: 0 2rem 1rem 2rem; border: 2px solid #3b82f6; border-radius: 0.5rem; overflow: hidden; background: #fff;
        }
        body.dark .clone-preview-panel { background: #0f172a; }
        .clone-preview-header { background: #3b82f6; color: white; padding: 0.3rem 0.8rem; font-size: 0.8rem; display: flex; justify-content: space-between; }
        .clone-preview-header button { background: none; border: none; color: white; cursor: pointer; font-size: 1rem; }
        .clone-preview-iframe { width: 100%; height: 500px; border: none; }
        .sysmon-popup {
            position: absolute; top: 100%; right: 0; margin-top: 0.5rem; background: #fff; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 0.8rem; font-size: 0.7rem; font-family: monospace; white-space: nowrap; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1); color: #1e293b;
        }
        body.dark .sysmon-popup { background: #1e293b; border-color: #334155; color: #e2e8f0; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        @media (max-width: 768px) {
            .top-bar { flex-direction: column; align-items: stretch; gap: 0.5rem; padding: 0.5rem; }
            .tool-buttons { justify-content: center; max-height: 150px; overflow-y: auto; gap: 0.3rem; }
            .tool-btn, .export-btn, .model-select, .theme-toggle { font-size: 0.7rem; padding: 0.2rem 0.6rem; }
            .export-buttons { margin-left: 0; justify-content: center; }
            .chat-header { padding: 0.5rem 1rem; }
            .chat-header h2 { font-size: 1rem; }
            .messages { padding: 1rem; }
            .message { max-width: 95%; }
            .input-area { padding: 0.5rem 1rem; }
            .input-wrapper { flex-wrap: wrap; border-radius: 1rem; padding: 0.5rem; }
            .input-wrapper input { width: 100%; order: 1; padding: 0.5rem; }
            .input-wrapper button { order: 2; width: 100%; margin-top: 0.3rem; }
            .file-upload-wrapper { order: 0; width: 100%; justify-content: space-between; margin-bottom: 0.3rem; }
            .voice-controls { order: 3; width: 100%; justify-content: center; margin-top: 0.3rem; }
            .clone-preview-panel { margin: 0 1rem 0.5rem 1rem; }
            .clone-preview-iframe { height: 300px; }
            .modal-content { width: 95%; max-width: 95%; padding: 1rem; }
            .sysmon-popup { font-size: 0.6rem; white-space: normal; width: 200px; right: -10px; }
        }
    </style>
</head>
<body>
<div class="top-bar">
    <div class="tool-buttons">
        <button class="tool-btn" data-tool="chat">💬 Chat</button>
        <button class="tool-btn" data-tool="website">🌐 Website</button>
        <button class="tool-btn" data-tool="htmlify">📄 Code→HTML</button>
        <button class="tool-btn" data-tool="refine">🔧 Refine</button>
        <button class="tool-btn" data-tool="search">🔍 Search</button>
        <button class="tool-btn" data-tool="appgen">📦 App</button>
        <button class="tool-btn" data-tool="clone">🖨️ Clone</button>
        <button class="tool-btn" id="geminiBtn">🖼️ Gemini Image</button>
        <button class="tool-btn" data-tool="cleaner">🧹 Cleaner</button>
        <button class="tool-btn" data-tool="prefs">⚙️ Prefs</button>
        <button class="tool-btn" id="skillsBtn">💾 Skills</button>
        <button class="tool-btn" id="memoryBtn">🧠 Memory</button>
        <button class="tool-btn" id="pluginsBtn">🧩 Plugins</button>
        <button class="tool-btn" id="backupBtn">💾 Backup</button>
        <button class="tool-btn" id="restoreBackupBtn">🔄 Restore Backup</button>
        <button class="tool-btn" id="compressMemoryBtn">🗜️ Compress Memory</button>
    </div>
    <div class="export-buttons">
        <button id="exportJSONBtn" class="export-btn">📄 JSON</button>
        <button id="exportMarkdownBtn" class="export-btn">📝 Markdown</button>
    </div>
    <select id="modelSelect" class="model-select"></select>
    <button id="sysmonBtn" class="tool-btn" style="position: relative;">📊 Stats</button>
    <button id="themeToggle" class="theme-toggle">🌙</button>
</div>

<div class="chat-container">
    <div class="chat-header">
        <h2>🧠 Smart Assistant (Streaming)</h2>
        <p>Ask me anything – I can chain multiple tools and stream responses word by word.</p>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <div class="input-wrapper">
            <div class="file-upload-wrapper">
                <label class="file-upload-label">📎 <span>Upload</span><input type="file" id="fileUpload" accept=".txt,.py,.js,.html,.css,.json,.md,.csv"></label>
                <button class="clear-history" id="clearHistoryBtn">🗑️ Clear History</button>
                <button class="stop-btn" id="stopBtn" style="display: none;">⏹️ Stop</button>
            </div>
            <input type="text" id="chatInput" placeholder="Type your request here... (Ctrl+Enter to send)" autofocus>
            <div class="voice-controls">
                <button id="micBtn" class="mic-btn" title="Voice input (speech recognition)">🎤</button>
            </div>
            <button id="sendBtn">Send</button>
        </div>
        <div id="autocompleteList" class="autocomplete-items" style="display: none;"></div>
    </div>
</div>

<!-- Clone Preview Panel -->
<div id="clonePreviewPanel" class="clone-preview-panel" style="display: none;">
    <div class="clone-preview-header"><span>🔍 Clone Preview</span><button id="closeClonePreview">✖️</button></div>
    <iframe id="cloneIframe" class="clone-preview-iframe"></iframe>
</div>

<!-- Modals (skills, memory, plugins, gemini, error recovery) -->
<div id="skillsModal" class="modal"><div class="modal-content"><span class="modal-close" id="closeSkillsModal">&times;</span><h3>📚 Custom Skills</h3><div id="skillList" class="skill-list"></div><div class="add-skill"><input type="text" id="newSkillName" placeholder="Skill name"><textarea id="newSkillPrompt" placeholder="Prompt" rows="2"></textarea><button id="addSkillBtn">➕ Add</button></div></div></div>
<div id="memoryModal" class="modal"><div class="modal-content"><span class="modal-close" id="closeMemoryModal">&times;</span><h3>🧠 Memory Browser</h3><div class="search-box"><input type="text" id="memorySearch" placeholder="Search..."><button id="searchMemoriesBtn">🔍 Search</button></div><div id="memoryList" class="memory-list"></div></div></div>
<div id="pluginsModal" class="modal"><div class="modal-content"><span class="modal-close" id="closePluginsModal">&times;</span><h3>🧩 Installed Plugins</h3><div id="pluginList" class="plugin-list"></div></div></div>
<div id="geminiModal" class="modal"><div class="modal-content"><span class="modal-close" id="closeGeminiModal">&times;</span><h3>🖼️ Gemini Nano Banana</h3><textarea id="geminiPrompt" rows="3" style="width:100%;" placeholder="A cat in a space suit..."></textarea><input type="file" id="geminiUpload" accept="image/*"><button id="runGeminiBtn">Generate / Edit</button><div id="geminiResult"></div></div></div>
<div id="errorRecoveryModal" class="modal"><div class="modal-content"><span class="modal-close" id="closeErrorModal">&times;</span><h3>⚠️ Step Failed</h3><p id="errorMessage"></p><div style="display: flex; gap: 1rem; margin-top: 1rem;"><button id="retryBtn" class="tool-btn" style="background: #3b82f6;">Retry</button><button id="skipBtn" class="tool-btn" style="background: #f59e0b;">Skip</button><button id="abortBtn" class="tool-btn" style="background: #ef4444;">Abort</button></div></div></div>

<script>
    // ========== DOM elements ==========
    const messagesDiv = document.getElementById('messages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileUpload = document.getElementById('fileUpload');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const stopBtn = document.getElementById('stopBtn');
    const modelSelect = document.getElementById('modelSelect');
    const themeToggle = document.getElementById('themeToggle');
    const exportJSONBtn = document.getElementById('exportJSONBtn');
    const exportMarkdownBtn = document.getElementById('exportMarkdownBtn');
    const skillsBtn = document.getElementById('skillsBtn');
    const skillsModal = document.getElementById('skillsModal');
    const closeSkillsModal = document.getElementById('closeSkillsModal');
    const memoryBtn = document.getElementById('memoryBtn');
    const memoryModal = document.getElementById('memoryModal');
    const closeMemoryModal = document.getElementById('closeMemoryModal');
    const memorySearch = document.getElementById('memorySearch');
    const searchMemoriesBtn = document.getElementById('searchMemoriesBtn');
    const memoryListDiv = document.getElementById('memoryList');
    const pluginsBtn = document.getElementById('pluginsBtn');
    const pluginsModal = document.getElementById('pluginsModal');
    const closePluginsModal = document.getElementById('closePluginsModal');
    const pluginListDiv = document.getElementById('pluginList');
    const backupBtn = document.getElementById('backupBtn');
    const restoreBackupBtn = document.getElementById('restoreBackupBtn');
    const geminiBtn = document.getElementById('geminiBtn');
    const geminiModal = document.getElementById('geminiModal');
    const closeGeminiModal = document.getElementById('closeGeminiModal');
    const runGeminiBtn = document.getElementById('runGeminiBtn');
    const geminiPrompt = document.getElementById('geminiPrompt');
    const geminiUpload = document.getElementById('geminiUpload');
    const geminiResult = document.getElementById('geminiResult');
    const sysmonBtn = document.getElementById('sysmonBtn');
    const compressMemoryBtn = document.getElementById('compressMemoryBtn');
    const clonePreviewPanel = document.getElementById('clonePreviewPanel');
    const cloneIframe = document.getElementById('cloneIframe');
    const closeClonePreview = document.getElementById('closeClonePreview');
    const toolBtns = document.querySelectorAll('.tool-btn[data-tool]');
    const micBtn = document.getElementById('micBtn');

    // Error recovery elements
    const errorModal = document.getElementById('errorRecoveryModal');
    const closeErrorModal = document.getElementById('closeErrorModal');
    const errorMessageSpan = document.getElementById('errorMessage');
    const retryBtn = document.getElementById('retryBtn');
    const skipBtn = document.getElementById('skipBtn');
    const abortBtn = document.getElementById('abortBtn');

    // ========== Voice Input (Speech Recognition) ==========
    let recognition = null;
    let isListening = false;

    function initSpeechRecognition() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            console.warn('Speech recognition not supported');
            if (micBtn) micBtn.title = 'Speech recognition not supported';
            if (micBtn) micBtn.disabled = true;
            return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            isListening = true;
            micBtn.classList.add('listening');
            micBtn.textContent = '🎤⏺';
        };
        recognition.onend = () => {
            isListening = false;
            micBtn.classList.remove('listening');
            micBtn.textContent = '🎤';
        };
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            chatInput.value = transcript;
            chatInput.focus();
        };
        recognition.onerror = (event) => {
            console.error('Speech recognition error', event.error);
            micBtn.classList.remove('listening');
            micBtn.textContent = '🎤';
            isListening = false;
            if (event.error !== 'no-speech') {
                alert('Speech recognition error: ' + event.error);
            }
        };
    }

    function toggleSpeechRecognition() {
        if (!recognition) {
            initSpeechRecognition();
            if (!recognition) return;
        }
        if (isListening) {
            recognition.stop();
        } else {
            try {
                recognition.start();
            } catch(e) {
                console.error('Could not start recognition', e);
            }
        }
    }

    if (micBtn) micBtn.addEventListener('click', toggleSpeechRecognition);
    initSpeechRecognition();

    // ========== Voice Output (Text-to-Speech) ==========
    function speakText(text) {
        if (!window.speechSynthesis) {
            alert('Text-to-speech not supported in this browser');
            return;
        }
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.9;
        utterance.pitch = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    // ========== Existing state ==========
    let conversationHistory = [];
    let currentEventSource = null;
    let currentModel = 'qwen2.5-coder:7b-instruct-q4_K_M';
    let isStreaming = false;
    let skills = [];
    let lastUserMessage = '';
    let pendingSessionId = null;

    // Clone preview
    if (closeClonePreview) {
        closeClonePreview.addEventListener('click', () => {
            clonePreviewPanel.style.display = 'none';
            cloneIframe.src = '';
        });
    }
    function showClonePreview(cloneFolder) {
        cloneIframe.src = `/preview/${cloneFolder}/index.html`;
        clonePreviewPanel.style.display = 'block';
        clonePreviewPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Skills
    function loadSkills() {
        const saved = localStorage.getItem('customSkills');
        if (saved) skills = JSON.parse(saved);
        else skills = [{ name: "Explain code", prompt: "Explain the following code in simple terms:\n\n" }];
        renderSkillList();
    }
    function saveSkills() { localStorage.setItem('customSkills', JSON.stringify(skills)); }
    function renderSkillList() {
        const container = document.getElementById('skillList');
        if (!container) return;
        container.innerHTML = '';
        skills.forEach((s, i) => {
            const div = document.createElement('div'); div.className = 'skill-item';
            div.innerHTML = `<div>${escapeHtml(s.name)}</div><div><button class="run-skill" data-idx="${i}">▶️</button><button class="edit-skill" data-idx="${i}">✏️</button><button class="delete-skill" data-idx="${i}">🗑️</button></div>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.run-skill').forEach(btn => btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.idx);
            chatInput.value = skills[idx].prompt;
            chatInput.focus();
            skillsModal.classList.remove('active');
        }));
        document.querySelectorAll('.edit-skill').forEach(btn => btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.idx);
            document.getElementById('newSkillName').value = skills[idx].name;
            document.getElementById('newSkillPrompt').value = skills[idx].prompt;
            skills.splice(idx,1);
            saveSkills(); renderSkillList();
        }));
        document.querySelectorAll('.delete-skill').forEach(btn => btn.addEventListener('click', () => {
            skills.splice(parseInt(btn.dataset.idx),1);
            saveSkills(); renderSkillList();
        }));
    }
    const addSkillBtn = document.getElementById('addSkillBtn');
    if (addSkillBtn) addSkillBtn.addEventListener('click', () => {
        const name = document.getElementById('newSkillName').value.trim();
        const prompt = document.getElementById('newSkillPrompt').value.trim();
        if (name && prompt) { skills.push({ name, prompt }); saveSkills(); renderSkillList(); document.getElementById('newSkillName').value = ''; document.getElementById('newSkillPrompt').value = ''; }
    });

    // Memory
    async function loadMemories(search = '') {
        let url = '/list_memories?limit=100';
        if (search) url += `&search=${encodeURIComponent(search)}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            const memories = data.memories || [];
            memoryListDiv.innerHTML = '';
            if (!memories.length) { memoryListDiv.innerHTML = '<div>No memories found.</div>'; return; }
            memories.forEach(m => {
                const div = document.createElement('div'); div.className = 'memory-item';
                div.innerHTML = `<div><strong>${escapeHtml(m.id)}</strong><br>${escapeHtml(m.document)}</div><div><button class="delete-memory" data-id="${escapeHtml(m.id)}">🗑️</button></div>`;
                memoryListDiv.appendChild(div);
            });
            document.querySelectorAll('.delete-memory').forEach(btn => btn.addEventListener('click', async () => {
                if (confirm('Delete this memory?')) {
                    await fetch('/delete_memory', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: btn.dataset.id }) });
                    loadMemories(memorySearch.value);
                }
            }));
        } catch(e) { memoryListDiv.innerHTML = '<div>Error loading memories.</div>'; }
    }
    if (searchMemoriesBtn) searchMemoriesBtn.addEventListener('click', () => loadMemories(memorySearch.value));
    if (memorySearch) memorySearch.addEventListener('keypress', e => { if (e.key === 'Enter') loadMemories(memorySearch.value); });

    // Plugins
    async function loadPlugins() {
        try {
            const res = await fetch('/list_plugins');
            const data = await res.json();
            const plugins = data.plugins || {};
            pluginListDiv.innerHTML = '';
            if (!Object.keys(plugins).length) { pluginListDiv.innerHTML = '<div>No plugins found.</div>'; return; }
            for (const [key, info] of Object.entries(plugins)) {
                const div = document.createElement('div'); div.className = 'plugin-item';
                div.innerHTML = `<div><strong>${escapeHtml(info.name)}</strong><br>${escapeHtml(info.description)}</div><div><button class="run-plugin" data-name="${key}">▶️</button></div>`;
                pluginListDiv.appendChild(div);
            }
            document.querySelectorAll('.run-plugin').forEach(btn => btn.addEventListener('click', async () => {
                const pluginName = btn.dataset.name;
                let args = {};
                const argsStr = prompt(`Enter arguments for plugin "${pluginName}" as JSON`, "{}");
                if (argsStr) try { args = JSON.parse(argsStr); } catch(e) { alert('Invalid JSON'); return; }
                const res = await fetch('/run_plugin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ plugin: pluginName, args }) });
                const data = await res.json();
                alert(data.error ? `Error: ${data.error}` : `Result: ${JSON.stringify(data.result, null, 2)}`);
            }));
        } catch(e) { pluginListDiv.innerHTML = '<div>Error loading plugins.</div>'; }
    }

    // Backup
    if (backupBtn) {
        backupBtn.addEventListener('click', async () => {
            backupBtn.textContent = '⏳ ...';
            try {
                const res = await fetch('/backup_memory', { method: 'POST' });
                const data = await res.json();
                alert(data.error ? `Backup failed: ${data.error}` : `Backup saved to ${data.path}`);
            } catch(e) { alert('Backup error'); }
            backupBtn.textContent = '💾 Backup';
        });
    }

    // Restore backup
    if (restoreBackupBtn) {
        restoreBackupBtn.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.zip';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const formData = new FormData();
                formData.append('file', file);
                restoreBackupBtn.textContent = '⏳ Restoring...';
                try {
                    const res = await fetch('/restore_memory', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.error) {
                        alert('Restore failed: ' + data.error);
                    } else {
                        alert(data.message + '\nThe dashboard will now reload.');
                        location.reload();
                    }
                } catch (err) {
                    alert('Restore error: ' + err.message);
                } finally {
                    restoreBackupBtn.textContent = '🔄 Restore Backup';
                }
            };
            input.click();
        });
    }

    // Memory compression
    if (compressMemoryBtn) {
        compressMemoryBtn.addEventListener('click', async () => {
            compressMemoryBtn.textContent = '⏳ Compressing...';
            try {
                const res = await fetch('/compress_memory', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ days_old: 30, max_memories: 20 }) });
                const data = await res.json();
                if (data.error) addMessage(`❌ Memory compression failed: ${data.error}`, 'ai');
                else addMessage(`✅ ${data.message}\n\nSummary: ${data.summary}`, 'ai');
            } catch(err) { addMessage(`❌ Memory compression error: ${err.message}`, 'ai'); }
            finally { compressMemoryBtn.textContent = '🗜️ Compress Memory'; }
        });
    }

    // Gemini
    if (geminiBtn) geminiBtn.addEventListener('click', () => geminiModal.classList.add('active'));
    if (closeGeminiModal) closeGeminiModal.addEventListener('click', () => geminiModal.classList.remove('active'));
    if (runGeminiBtn) {
        runGeminiBtn.addEventListener('click', async () => {
            const prompt = geminiPrompt.value.trim();
            if (!prompt) return alert('Enter a prompt');
            const file = geminiUpload.files[0];
            let imageBase64 = null;
            if (file) {
                const reader = new FileReader();
                reader.onload = async (e) => { await callGemini(prompt, e.target.result); };
                reader.readAsDataURL(file);
            } else {
                await callGemini(prompt, null);
            }
        });
    }
    async function callGemini(prompt, imageBase64) {
        geminiResult.innerText = '⏳ Generating...';
        try {
            const body = { prompt };
            if (imageBase64) body.image = imageBase64;
            const res = await fetch('/gemini_image', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            const data = await res.json();
            if (data.error) geminiResult.innerText = '❌ ' + data.error;
            else geminiResult.innerHTML = `✅ Saved: <a href="${data.path}" target="_blank">${data.path}</a>`;
        } catch(e) { geminiResult.innerText = '❌ Request failed'; }
    }

    // Error recovery
    if (closeErrorModal) closeErrorModal.addEventListener('click', () => { errorModal.classList.remove('active'); pendingSessionId = null; });
    if (retryBtn) retryBtn.addEventListener('click', async () => {
        if (!pendingSessionId) return;
        errorModal.classList.remove('active');
        const res = await fetch('/recover_chain', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: pendingSessionId, decision: 'retry' }) });
        const data = await res.json();
        if (data.status === 'continue') {
            if (data.context && data.context.original_request) sendMessageWithText(data.context.original_request);
            else addMessage('❌ Cannot resume: missing original request.', 'ai');
        } else addMessage('❌ Error recovery failed: ' + (data.error || 'unknown'), 'ai');
        pendingSessionId = null;
    });
    if (skipBtn) skipBtn.addEventListener('click', async () => {
        if (!pendingSessionId) return;
        errorModal.classList.remove('active');
        const res = await fetch('/recover_chain', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: pendingSessionId, decision: 'skip' }) });
        const data = await res.json();
        if (data.status === 'continue') {
            if (data.context && data.context.original_request) sendMessageWithText(data.context.original_request);
            else addMessage('❌ Cannot resume: missing original request.', 'ai');
        } else addMessage('❌ Error recovery failed: ' + (data.error || 'unknown'), 'ai');
        pendingSessionId = null;
    });
    if (abortBtn) abortBtn.addEventListener('click', async () => {
        if (!pendingSessionId) return;
        errorModal.classList.remove('active');
        await fetch('/recover_chain', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: pendingSessionId, decision: 'abort' }) });
        addMessage('⏹️ Chain aborted by user.', 'ai');
        pendingSessionId = null;
    });

    // Modal close on background
    window.addEventListener('click', e => {
        if (e.target === skillsModal) skillsModal.classList.remove('active');
        if (e.target === memoryModal) memoryModal.classList.remove('active');
        if (e.target === pluginsModal) pluginsModal.classList.remove('active');
        if (e.target === geminiModal) geminiModal.classList.remove('active');
        if (e.target === errorModal) errorModal.classList.remove('active');
    });
    if (skillsBtn) skillsBtn.addEventListener('click', () => skillsModal.classList.add('active'));
    if (closeSkillsModal) closeSkillsModal.addEventListener('click', () => skillsModal.classList.remove('active'));
    if (memoryBtn) memoryBtn.addEventListener('click', () => { memoryModal.classList.add('active'); loadMemories(); });
    if (closeMemoryModal) closeMemoryModal.addEventListener('click', () => memoryModal.classList.remove('active'));
    if (pluginsBtn) pluginsBtn.addEventListener('click', () => { pluginsModal.classList.add('active'); loadPlugins(); });
    if (closePluginsModal) closePluginsModal.addEventListener('click', () => pluginsModal.classList.remove('active'));

    // Load models
    async function loadModels() {
        try {
            const res = await fetch('/models');
            const data = await res.json();
            modelSelect.innerHTML = '';
            for (let m of data.models) {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                if (m === currentModel) opt.selected = true;
                modelSelect.appendChild(opt);
            }
            modelSelect.addEventListener('change', () => {
                currentModel = modelSelect.value;
                addMessage(`🔄 Model changed to ${currentModel}`, 'ai');
            });
        } catch(e) { console.error(e); }
    }

    // Theme
    function setTheme(theme) {
        if (theme === 'dark') {
            document.body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            themeToggle.textContent = '☀️';
        } else {
            document.body.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            themeToggle.textContent = '🌙';
        }
    }
    if (themeToggle) themeToggle.addEventListener('click', () => setTheme(document.body.classList.contains('dark') ? 'light' : 'dark'));
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) setTheme(savedTheme);
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme('dark');

    // Export
    function downloadFile(content, filename, mimeType = 'text/plain') {
        const blob = new Blob([content], { type: mimeType });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
    }
    function exportAsJSON() { downloadFile(JSON.stringify(conversationHistory, null, 2), `qwen_conversation_${Date.now()}.json`, 'application/json'); }
    function exportAsMarkdown() {
        let md = `# Qwen AI Conversation\n_Exported ${new Date().toLocaleString()}_\n\n`;
        conversationHistory.forEach(m => md += `**${m.sender === 'user' ? 'User' : 'AI'}**:\n${m.text}\n\n`);
        downloadFile(md, `qwen_conversation_${Date.now()}.md`, 'text/markdown');
    }
    if (exportJSONBtn) exportJSONBtn.addEventListener('click', exportAsJSON);
    if (exportMarkdownBtn) exportMarkdownBtn.addEventListener('click', exportAsMarkdown);

    // Chat UI
    function deleteMessage(idx) {
        conversationHistory.splice(idx, 1);
        saveConversation();
        refreshMessages();
    }
    function refreshMessages() {
        messagesDiv.innerHTML = '';
        conversationHistory.forEach((msg, idx) => addMessageToDOM(msg.text, msg.sender, msg.tokenInfo, idx));
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    function loadConversation() {
        const saved = localStorage.getItem('chatHistory');
        if (saved) {
            conversationHistory = JSON.parse(saved);
            refreshMessages();
        } else {
            addMessageToDOM("Hello! I'm your AI assistant. Describe what you'd like to do.", 'ai');
        }
    }
    function saveConversation() { localStorage.setItem('chatHistory', JSON.stringify(conversationHistory)); }
    function addMessageToDOM(text, sender, tokenInfo = null, msgIndex = null) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        const avatar = document.createElement('div');
        avatar.className = 'message-avatar';
        avatar.textContent = sender === 'user' ? '👤' : '🤖';
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.innerHTML = text.replace(/\n/g, '<br>').replace(/`([^`]+)`/g, '<code>$1</code>');
        messageDiv.appendChild(avatar); messageDiv.appendChild(contentDiv);

        const delBtn = document.createElement('button'); delBtn.className = 'delete-msg'; delBtn.innerHTML = '🗑️';
        const idx = msgIndex !== undefined ? msgIndex : conversationHistory.length;
        delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteMessage(idx); });
        messageDiv.appendChild(delBtn);

        if (sender === 'ai') {
            const copyBtn = document.createElement('button'); copyBtn.className = 'copy-msg-btn'; copyBtn.innerHTML = '📋';
            copyBtn.addEventListener('click', () => { navigator.clipboard.writeText(text); copyBtn.innerHTML = '✅'; setTimeout(() => copyBtn.innerHTML = '📋', 1500); });
            messageDiv.appendChild(copyBtn);
            const speakBtn = document.createElement('button'); speakBtn.className = 'speak-msg-btn'; speakBtn.innerHTML = '🔊';
            speakBtn.title = 'Read aloud';
            speakBtn.addEventListener('click', () => { speakText(text); });
            messageDiv.appendChild(speakBtn);
            if (text.includes('❌') || text.toLowerCase().includes('error')) {
                const retryBtn2 = document.createElement('button'); retryBtn2.className = 'retry-msg-btn'; retryBtn2.innerHTML = '🔄 Retry';
                retryBtn2.addEventListener('click', () => { if (lastUserMessage) sendMessageWithText(lastUserMessage); else addMessage('No message to retry.', 'ai'); });
                messageDiv.appendChild(retryBtn2);
            }
        }
        if (tokenInfo && sender === 'ai') {
            const infoSpan = document.createElement('div'); infoSpan.className = 'token-info';
            infoSpan.innerText = `⏱️ ${tokenInfo.duration}s | 🪙 ${tokenInfo.total_tokens} tokens`;
            messageDiv.appendChild(infoSpan);
        }
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    function addMessage(text, sender, tokenInfo = null) {
        conversationHistory.push({ text, sender, timestamp: Date.now(), tokenInfo });
        saveConversation();
        addMessageToDOM(text, sender, tokenInfo, conversationHistory.length - 1);
    }
    function addStreamingMessage() {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ai streaming-message';
        const avatar = document.createElement('div'); avatar.className = 'message-avatar'; avatar.textContent = '🤖';
        const contentDiv = document.createElement('div'); contentDiv.className = 'message-content'; contentDiv.innerHTML = '';
        msgDiv.appendChild(avatar); msgDiv.appendChild(contentDiv);
        const delBtn = document.createElement('button'); delBtn.className = 'delete-msg'; delBtn.innerHTML = '🗑️';
        delBtn.addEventListener('click', () => msgDiv.remove());
        msgDiv.appendChild(delBtn);
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return { container: msgDiv, contentDiv };
    }
    async function sendMessageWithText(message) {
        if (!message.trim() || isStreaming) return;
        addMessage(message, 'user');
        lastUserMessage = message;
        chatInput.value = '';
        chatInput.disabled = true; sendBtn.disabled = true; stopBtn.style.display = 'inline-block';
        isStreaming = true;
        const { container, contentDiv } = addStreamingMessage();
        let accumulated = '', finalTokenInfo = null, stepStarted = false;
        const url = `/stream_smart_agent?request=${encodeURIComponent(message)}&model=${encodeURIComponent(currentModel)}`;
        const evtSource = new EventSource(url);
        currentEventSource = evtSource;
        evtSource.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.error) {
                    contentDiv.innerHTML += `<span style="color:red;">❌ ${data.error}</span>`;
                    evtSource.close(); cleanup();
                    return;
                }
                if (data.token) {
                    if (!stepStarted) accumulated += data.token; else accumulated += data.token;
                    contentDiv.innerHTML = accumulated.replace(/\n/g, '<br>');
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
                if (data.step_start) {
                    stepStarted = true; accumulated = ''; contentDiv.innerHTML = `<div class="token-info">🔧 ${data.step_start} ...</div>`;
                }
                if (data.result !== undefined) {
                    contentDiv.innerHTML += `<br><strong>✅ Result:</strong> ${data.result}`;
                    if (data.path) contentDiv.innerHTML += `<br>📁 ${data.path}`;
                    stepStarted = false;
                }
                if (data.done) {
                    evtSource.close(); cleanup();
                    conversationHistory.push({ text: contentDiv.innerText, sender: 'ai', timestamp: Date.now(), tokenInfo: finalTokenInfo });
                    saveConversation(); container.classList.remove('streaming-message');
                }
                if (data.token_info) {
                    finalTokenInfo = data.token_info;
                    const span = document.createElement('div'); span.className = 'token-info'; span.innerText = `⏱️ ${data.token_info.duration}s | 🪙 ${data.token_info.total_tokens}`;
                    container.appendChild(span);
                }
                if (data.tool === 'clone' && data.directory) showClonePreview(data.directory);
                if (data.error_recovery_required) {
                    pendingSessionId = data.session_id;
                    errorMessageSpan.innerText = `Failed step: ${data.failed_tool}\nError: ${data.error_message}`;
                    errorModal.classList.add('active');
                    evtSource.close(); cleanup();
                    return;
                }
                if (data.error_occurred) {
                    pendingSessionId = data.session_id;
                    errorMessageSpan.innerText = `A step failed. Check the console for details.`;
                    errorModal.classList.add('active');
                    evtSource.close(); cleanup();
                    return;
                }
            } catch(e) { console.error(e); }
        };
        evtSource.onerror = () => { evtSource.close(); cleanup(); contentDiv.innerHTML += '<br>❌ Connection error.'; };
        function cleanup() {
            isStreaming = false; currentEventSource = null; stopBtn.style.display = 'none';
            chatInput.disabled = false; sendBtn.disabled = false;
        }
    }
    function sendMessage() { sendMessageWithText(chatInput.value.trim()); }
    function stopGeneration() { if (currentEventSource) { currentEventSource.close(); isStreaming = false; stopBtn.style.display = 'none'; chatInput.disabled = false; sendBtn.disabled = false; addMessage('⏹️ Stopped by user.', 'ai'); } }
    if (sendBtn) sendBtn.addEventListener('click', sendMessage);
    if (chatInput) chatInput.addEventListener('keypress', e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); sendMessage(); } });
    if (clearHistoryBtn) clearHistoryBtn.addEventListener('click', () => { if (confirm('Clear all history?')) { conversationHistory = []; localStorage.removeItem('chatHistory'); messagesDiv.innerHTML = ''; addMessage('Conversation cleared.', 'ai'); } });
    if (stopBtn) stopBtn.addEventListener('click', stopGeneration);
    if (fileUpload) fileUpload.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => { chatInput.value = `Please process this file:\n\n\`\`\`\n${ev.target.result}\n\`\`\``; chatInput.focus(); };
        reader.readAsText(file);
        fileUpload.value = '';
    });

    // Tool buttons
    const toolCommands = {
        'website': 'Generate a website: ',
        'htmlify': 'Convert this code to HTML:\n',
        'refine': 'Refine this code: ',
        'search': 'Search the web for: ',
        'appgen': 'Write a script: ',
        'clone': 'Clone website: '
    };
    if (toolBtns) {
        toolBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tool = btn.getAttribute('data-tool');
                if (tool === 'cleaner') {
                    fetch('/open_file_cleaner', { method: 'POST' })
                        .then(res => res.json())
                        .then(data => addMessage(data.error ? `❌ ${data.error}` : `✅ ${data.message}`, 'ai'))
                        .catch(err => addMessage(`❌ ${err.message}`, 'ai'));
                    return;
                }
                if (toolCommands[tool]) {
                    chatInput.value = toolCommands[tool];
                    chatInput.focus();
                }
            });
        });
    }

    // Drag & drop
    const chatContainer = document.querySelector('.chat-container');
    function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => document.body.addEventListener(ev, preventDefaults));
    ['dragenter', 'dragover'].forEach(ev => chatContainer.addEventListener(ev, () => chatContainer.classList.add('drag-over')));
    ['dragleave', 'drop'].forEach(ev => chatContainer.addEventListener(ev, () => chatContainer.classList.remove('drag-over')));
    if (chatContainer) {
        chatContainer.addEventListener('drop', e => {
            const file = e.dataTransfer.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => chatInput.value = `Please process this file:\n\n\`\`\`\n${ev.target.result}\n\`\`\``;
                reader.readAsText(file);
            }
        });
    }

    // Autocomplete
    const acList = document.getElementById('autocompleteList');
    let acItems = [], acIndex = -1, acTimer = null;
    if (chatInput && acList) {
        chatInput.addEventListener('input', function() {
            const prefix = this.value.trim();
            if (prefix.length < 2) { acList.style.display = 'none'; return; }
            if (acTimer) clearTimeout(acTimer);
            acTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`/autocomplete?prefix=${encodeURIComponent(prefix)}`);
                    const data = await res.json();
                    acItems = data.suggestions || [];
                    acIndex = -1;
                    if (!acItems.length) { acList.style.display = 'none'; return; }
                    acList.innerHTML = '';
                    acItems.forEach(s => {
                        const div = document.createElement('div'); div.className = 'autocomplete-item'; div.textContent = s;
                        div.addEventListener('click', () => { chatInput.value = s; acList.style.display = 'none'; chatInput.focus(); });
                        acList.appendChild(div);
                    });
                    acList.style.display = 'block';
                } catch(e) { console.error(e); }
            }, 300);
        });
        chatInput.addEventListener('keydown', e => {
            if (acList.style.display === 'block') {
                if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = (acIndex + 1) % acItems.length; highlightAc(acIndex); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); acIndex = (acIndex - 1 + acItems.length) % acItems.length; highlightAc(acIndex); }
                else if (e.key === 'Enter' && acIndex >= 0) { e.preventDefault(); chatInput.value = acItems[acIndex]; acList.style.display = 'none'; }
                else if (e.key === 'Escape') acList.style.display = 'none';
            }
        });
        function highlightAc(idx) {
            const items = document.querySelectorAll('.autocomplete-item');
            items.forEach((item,i) => { if (i === idx) item.classList.add('selected'); else item.classList.remove('selected'); });
            if (items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
        }
        document.addEventListener('click', e => { if (!acList.contains(e.target) && e.target !== chatInput) acList.style.display = 'none'; });
    }

    // System monitor
    let sysmonPopup = null, sysmonInterval = null;
    function createPopup() {
        if (sysmonPopup) return;
        const pop = document.createElement('div'); pop.className = 'sysmon-popup'; pop.style.display = 'none';
        sysmonBtn.style.position = 'relative'; sysmonBtn.appendChild(pop);
        sysmonPopup = pop;
    }
    async function updateSysmon() {
        if (!sysmonPopup) return;
        try {
            const res = await fetch('/system_stats');
            const data = await res.json();
            let gpu = '';
            if (data.gpu && data.gpu.gpu_percent !== undefined) gpu = ` | 🎮 GPU: ${data.gpu.gpu_percent}%`;
            sysmonPopup.innerHTML = `🖥️ CPU: ${data.cpu_percent}% | 🧠 RAM: ${data.ram_percent}% (${data.ram_used_gb}/${data.ram_total_gb} GB)${gpu}`;
        } catch(e) {}
    }
    function toggleSysmon() {
        createPopup();
        if (sysmonPopup.style.display === 'none') {
            updateSysmon();
            sysmonPopup.style.display = 'block';
            if (sysmonInterval) clearInterval(sysmonInterval);
            sysmonInterval = setInterval(updateSysmon, 2000);
        } else {
            sysmonPopup.style.display = 'none';
            if (sysmonInterval) clearInterval(sysmonInterval);
            sysmonInterval = null;
        }
    }
    if (sysmonBtn) sysmonBtn.addEventListener('click', toggleSysmon);
    setInterval(() => { if (sysmonPopup && sysmonPopup.style.display === 'block') updateSysmon(); }, 2000);

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }

    loadModels(); loadSkills(); loadConversation();
</script>
</body>
</html>
