<!DOCTYPE html>
<html>
<head>
    <title>AI Studio Cloud</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; background: #0f172a; color: white; }
        textarea, button { width: 100%; padding: 10px; margin: 5px 0; }
        #response { background: #1e293b; padding: 10px; border-radius: 8px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>🤖 AI Studio Cloud</h1>
    <textarea id="message" rows="3" placeholder="Type your message..."></textarea>
    <button onclick="send()">Send</button>
    <div id="response"></div>
    <script>
        async function send() {
            const msg = document.getElementById('message').value;
            const responseDiv = document.getElementById('response');
            responseDiv.innerText = "Thinking...";
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            responseDiv.innerText = data.reply || data.error;
        }
    </script>
</body>
</html>
