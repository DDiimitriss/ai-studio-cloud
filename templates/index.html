<!DOCTYPE html>
{% raw %}
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Studio Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root {
  --bg: #0a0c10; --bg2: #111318; --bg3: #181c24; --border: #1e2330; --border2: #2a3045;
  --text: #e2e8f0; --muted: #64748b; --accent: #3b82f6; --accent2: #6366f1;
  --green: #10b981; --amber: #f59e0b; --red: #ef4444; --user-bg: #1a2035; --ai-bg: #111318;
  --font-mono: 'Space Mono', monospace; --font-ui: 'Syne', sans-serif; --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,.4);
}
.light {
  --bg: #f8fafc; --bg2: #ffffff; --bg3: #f1f5f9; --border: #e2e8f0; --border2: #cbd5e1;
  --text: #0f172a; --muted: #94a3b8; --user-bg: #dbeafe; --ai-bg: #ffffff;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:14px;display:flex;flex-direction:column}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .3s;overflow:hidden}
#sidebar.collapsed{width:0;min-width:0}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:16px;font-weight:800;letter-spacing:-.5px}
.logo-ver{font-size:10px;color:var(--muted);font-family:var(--font-mono)}
.sidebar-section{padding:12px 10px 4px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.sidebar-btn{display:flex;align-items:center;gap:10px;width:calc(100% - 8px);padding:9px 14px;background:none;border:none;color:var(--text);font-family:var(--font-ui);font-size:13px;font-weight:600;cursor:pointer;border-radius:8px;margin:1px 4px;transition:background .15s,color .15s;text-align:left}
.sidebar-btn:hover{background:var(--bg3);color:var(--accent)}
.sidebar-btn.active{background:var(--bg3);color:var(--accent)}
.sidebar-btn .icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
#stats-bar{margin-top:auto;padding:10px 14px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:10px;color:var(--muted)}
.stat-row{display:flex;justify-content:space-between;margin-bottom:5px;align-items:center}
.stat-label{color:var(--muted)}
.stat-val{color:var(--text);font-weight:700}
.bar-track{width:80px;height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:var(--accent);transition:width .5s}
.bar-fill.warn{background:var(--amber)}
.bar-fill.danger{background:var(--red)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:52px;min-height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px}
#toggle-sidebar{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;border-radius:6px;transition:color .15s}
#toggle-sidebar:hover{color:var(--text)}
#topbar-title{font-weight:800;font-size:15px;letter-spacing:-.3px;flex:1}

#model-select {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border2);
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  max-width: 220px;
  outline: none;
}
#model-select option { background: var(--bg2); color: var(--text); }

.topbar-btn{background:none;border:1px solid var(--border2);color:var(--muted);padding:5px 10px;border-radius:7px;font-family:var(--font-ui);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.topbar-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--accent)}
#panels{flex:1;display:flex;overflow:hidden}
#chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
#messages{flex:1;overflow-y:auto;padding:24px 24px 24px;scroll-behavior:smooth}
#messages > *{max-width:900px;margin-left:auto;margin-right:auto}
#messages::-webkit-scrollbar{width:6px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

.msg{display:flex;gap:14px;margin-bottom:14px;animation:fadeUp .25s ease}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:2px}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.msg.ai .msg-avatar{background:var(--bg3);border:1px solid var(--border2)}
.msg-body{flex:1;min-width:0}

.msg-role{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;text-transform:uppercase}

.msg-content{background:var(--ai-bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;line-height:1.7;font-size:15px;word-break:break-word}
.msg.user .msg-content{background:var(--user-bg);border-color:var(--accent)20}
.msg-content pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0;overflow:hidden;margin:10px 0;position:relative}
.msg-content pre code{display:block;padding:14px 16px;font-family:var(--font-mono);font-size:12px;line-height:1.6;overflow-x:auto;background:transparent !important}
.msg-content code{font-family:var(--font-mono);font-size:12px;background:var(--bg);padding:2px 6px;border-radius:4px;color:var(--accent)}
.code-copy-btn{position:absolute;top:8px;right:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--muted);padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;opacity:0;transition:opacity .2s;font-family:var(--font-ui);font-weight:600}
.msg-content pre:hover .code-copy-btn{opacity:1}
.code-copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.msg-content img{max-width:100%;border-radius:8px;margin:10px 0;border:1px solid var(--border);cursor:pointer;transition:transform .2s}
.msg-content img:hover{transform:scale(1.02)}
model-viewer{width:100%;height:400px;border-radius:8px;margin:10px 0;border:1px solid var(--border);background:var(--bg)}
.msg-content audio{width:100%;margin:10px 0;border-radius:8px;background:var(--bg3)}
.msg-content video{width:100%;max-height:500px;border-radius:8px;margin:10px 0;border:1px solid var(--border);background:#000}
.msg-content table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.msg-content th{background:var(--bg3);padding:10px 12px;text-align:left;font-weight:700;border-bottom:2px solid var(--border2)}
.msg-content td{padding:10px 12px;border-bottom:1px solid var(--border)}
.msg-content tr:last-child td{border-bottom:none}
.msg-content tr:hover td{background:var(--bg3)}
.msg-content blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:10px 0;background:var(--bg3);border-radius:0 8px 8px 0;color:var(--muted);font-style:italic}
.msg-content ul,.msg-content ol{margin:8px 0;padding-left:24px}
.msg-content li{margin:4px 0;line-height:1.6}
.msg-content a{color:var(--accent);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .2s}
.msg-content a:hover{border-bottom-color:var(--accent)}
.generated-media-wrap{margin:12px 0;padding:12px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px}
.media-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.media-action-btn{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border2);color:var(--text);padding:7px 14px;border-radius:7px;font-family:var(--font-ui);font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;transition:all .15s}
.media-action-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;text-decoration:none;transform:translateY(-1px)}
.msg-actions{display:flex;gap:6px;margin-top:8px;opacity:0;transition:opacity .15s;flex-wrap:wrap;align-items:center}
.msg:hover .msg-actions{opacity:1}
.msg-action-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--font-ui);transition:all .15s;font-weight:600}
.msg-action-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}

.typing-dots{display:flex;gap:4px;align-items:center;padding:8px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce .9s infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.step-chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);padding:5px 12px;border-radius:99px;font-size:11px;font-family:var(--font-mono);margin:3px 0;color:var(--muted)}
.step-chip.running{border-color:var(--accent);color:var(--accent);animation:pulse 1.5s infinite}
.step-chip.done{border-color:var(--green);color:var(--green)}
.step-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
#input-area{padding:16px 24px 18px;background:var(--bg2);border-top:1px solid var(--border)}
#input-wrap{position:relative;display:flex;align-items:flex-end;gap:10px;max-width:1100px;margin:0 auto;width:100%}
.input-field-wrap{position:relative;flex:1 1 auto;min-width:0}
.input-hint{font-size:11px;color:var(--muted);margin-top:8px;font-family:var(--font-mono);text-align:center;max-width:1100px;margin-left:auto;margin-right:auto}
#user-input{display:block;width:100%;box-sizing:border-box;resize:none;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-family:var(--font-ui);font-size:15px;padding:14px 18px;min-height:52px;max-height:200px;outline:none;transition:border-color .15s;line-height:1.55}
#user-input:focus{border-color:var(--accent)}
#user-input::placeholder{color:var(--muted)}
#send-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;width:52px;height:52px;border-radius:12px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s,transform .1s;flex-shrink:0}
#send-btn:hover{opacity:.9;transform:scale(1.05)}
#send-btn:active{transform:scale(.97)}
#stop-btn{background:var(--red)22;border:1px solid var(--red)44;color:var(--red);width:52px;height:52px;border-radius:12px;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
#stop-btn:hover{background:var(--red)33}
#stop-btn.visible{display:flex}
#voice-btn{background:none;border:1px solid var(--border2);color:var(--muted);width:52px;height:52px;border-radius:12px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
#voice-btn:hover{color:var(--text);border-color:var(--border2)}
#voice-btn.recording{color:var(--red);border-color:var(--red);background:var(--red)11;animation:pulse 1s infinite}
#attach-preview{max-width:1100px;margin:0 auto 6px;display:none;align-items:center;gap:8px;padding:6px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;font-size:12px;color:var(--text)}
#attach-preview.visible{display:flex}
#attach-thumb{width:36px;height:36px;border-radius:5px;object-fit:cover;flex-shrink:0}
#attach-label{flex:1;font-family:var(--font-mono);font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#attach-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 2px;line-height:1}
#attach-remove:hover{color:var(--red)}
#attach-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);width:52px;height:52px;border-radius:12px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
#attach-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--bg3)}
#attach-btn.has-image{color:var(--accent);border-color:var(--accent);background:#3b82f622}
#enhance-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--muted);width:36px;height:36px;border-radius:10px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;opacity:.5}
#enhance-btn.on{color:#f59e0b;border-color:#f59e0b44;background:#f59e0b11;opacity:1}
#enhance-btn:hover{opacity:1}
#tool-panel{width:0;overflow:hidden;border-left:1px solid var(--border);background:var(--bg2);transition:width .3s;display:flex;flex-direction:column}
#tool-panel.open{width:460px;min-width:460px}
#tool-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
#tool-panel-title{font-weight:800;font-size:15px;flex:1}
#close-panel{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:5px}
#close-panel:hover{color:var(--text)}
#tool-panel-body{flex:1;overflow-y:auto;padding:16px}
#tool-panel-body::-webkit-scrollbar{width:4px}
#tool-panel-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.form-input,.form-textarea,.form-select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font-ui);font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-select{cursor:pointer}
.form-select option{background:var(--bg2)}
.run-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;color:#fff;font-family:var(--font-ui);font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.run-btn:hover{opacity:.9}
.run-btn:disabled{opacity:.4;cursor:not-allowed}
.result-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:var(--font-mono);font-size:11px;color:var(--muted);line-height:1.6;max-height:300px;overflow-y:auto;margin-top:12px;white-space:pre-wrap;word-break:break-all}
.result-box.success{border-color:var(--green)44;color:var(--green)}
.result-box.error{border-color:var(--red)44;color:var(--red)}
#modal-overlay{display:none;position:fixed;inset:0;background:#000a;z-index:100;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;max-width:400px;width:90%;box-shadow:0 24px 60px #0008;animation:popIn .2s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
#modal h3{font-size:16px;font-weight:800;margin-bottom:8px}
#modal p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:var(--font-ui);transition:all .15s}
.modal-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-btn.danger{background:var(--red);border-color:var(--red);color:#fff}
.modal-btn:hover{opacity:.85}
#toast-container{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;font-size:13px;box-shadow:var(--shadow);animation:slideIn .25s ease;pointer-events:auto;display:flex;align-items:center;gap:8px;min-width:220px}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.toast.success{border-color:var(--green)55}
.toast.error{border-color:var(--red)55}
#drop-overlay{display:none;position:fixed;inset:0;background:#0a0c10cc;z-index:90;align-items:center;justify-content:center;flex-direction:column;gap:12px;border:3px dashed var(--accent);font-size:18px;font-weight:700;color:var(--accent)}
#drop-overlay.active{display:flex}
#export-menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:6px;z-index:40;box-shadow:var(--shadow);display:none;min-width:160px}
#export-menu.open{display:block}
.export-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:7px;font-size:13px;cursor:pointer;transition:background .1s}
.export-item:hover{background:var(--bg3)}
.memory-item,.plugin-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.5}
.memory-item-meta,.plugin-name{font-size:10px;color:var(--muted);font-family:var(--font-mono);margin-bottom:4px;font-weight:700}
.plugin-card{display:flex;align-items:center;gap:10px}
.plugin-desc{font-size:11px;color:var(--muted);margin-top:2px}
.plugin-run{margin-left:auto;background:none;border:1px solid var(--border2);color:var(--accent);padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:var(--font-ui);font-weight:600}
.plugin-run:hover{background:var(--accent)11}
.memory-del{float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px}
.memory-del:hover{color:var(--red)}
.health-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;font-size:12px;font-family:var(--font-mono)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.green{background:var(--green)}
.dot.red{background:var(--red)}
.dot.amber{background:var(--amber)}
@media(max-width:700px){#sidebar{display:none}#tool-panel.open{width:100vw;position:fixed;inset:0;z-index:60}}
</style>
</head>
<body>

<div id="drop-overlay">📎 Drop file to attach</div>
<div id="toast-container"></div>

<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title">Confirm</h3>
    <p id="modal-msg">Are you sure?</p>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<div id="app">
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🧠</div>
      <div>
        <div class="logo-text">AI Studio Pro</div>
        <div class="logo-ver">v2.1 · Cloud</div>
      </div>
    </div>
    <div class="sidebar-section">Tools</div>
    <button class="sidebar-btn active" onclick="openTool('chat')" id="btn-chat"><span class="icon">💬</span> Chat</button>
    <button class="sidebar-btn" onclick="openTool('website')" id="btn-website"><span class="icon">🌐</span> Website Generator</button>
    <button class="sidebar-btn" onclick="openTool('code')" id="btn-code"><span class="icon">💻</span> Code Tools</button>
    <button class="sidebar-btn" onclick="openTool('search')" id="btn-search"><span class="icon">🔍</span> Web Search</button>
    <button class="sidebar-btn" onclick="openTool('appgen')" id="btn-appgen"><span class="icon">⚙️</span> App Generator</button>
    <button class="sidebar-btn" onclick="openTool('clone')" id="btn-clone"><span class="icon">📋</span> Clone Website</button>
    <button class="sidebar-btn" onclick="openTool('image')" id="btn-image"><span class="icon">🎨</span> Image Generation</button>
    <div class="sidebar-section">System</div>
    <button class="sidebar-btn" onclick="openTool('memory')" id="btn-memory"><span class="icon">🧠</span> Memory</button>
    <button class="sidebar-btn" onclick="openTool('plugins')" id="btn-plugins"><span class="icon">🔌</span> Plugins</button>
    <button class="sidebar-btn" onclick="openTool('health')" id="btn-health"><span class="icon">❤️</span> Health Check</button>
    <div class="sidebar-section">Preferences</div>
    <button class="sidebar-btn" onclick="toggleTheme()"><span class="icon" id="theme-icon">☀️</span> Toggle Theme</button>
    <button class="sidebar-btn" onclick="clearChatUI()"><span class="icon">🗑️</span> Clear Chat</button>
    <button class="sidebar-btn" onclick="wipeMemory()"><span class="icon">🧨</span> Wipe All Memory</button>
    <div id="stats-bar">
      <div class="stat-row"><span class="stat-label">CPU</span><span class="stat-val" id="stat-cpu">–</span><div class="bar-track"><div class="bar-fill" id="bar-cpu" style="width:0%"></div></div></div>
      <div class="stat-row"><span class="stat-label">RAM</span><span class="stat-val" id="stat-ram">–</span><div class="bar-track"><div class="bar-fill" id="bar-ram" style="width:0%"></div></div></div>
      <div class="stat-row" id="gpu-row" style="display:none"><span class="stat-label">GPU</span><span class="stat-val" id="stat-gpu">–</span><div class="bar-track"><div class="bar-fill" id="bar-gpu" style="width:0%"></div></div></div>
    </div>
  </nav>

  <div id="main">
    <div id="topbar">
      <button id="toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
      <div id="topbar-title">Chat</div>
      
      <select id="model-select" title="Select model"></select>
      
      <div style="position:relative">
        <button class="topbar-btn" onclick="toggleExportMenu()">⬇ Export</button>
        <div id="export-menu">
          <div class="export-item" onclick="exportChat('json')">📄 Export JSON</div>
          <div class="export-item" onclick="exportChat('md')">📝 Export Markdown</div>
        </div>
      </div>
      <button class="topbar-btn" onclick="openTool('health')">❤️ Health</button>
    </div>

    <div id="panels">
      <div id="chat-panel">
        <div id="messages">
        </div>

        <div id="input-area">
          <div id="attach-preview">
            <img id="attach-thumb" src="" alt=""/>
            <span id="attach-label">No file</span>
            <button id="attach-remove" onclick="clearAttachment()" title="Remove file">✕</button>
          </div>
          <input type="file" id="attach-file-input" accept="image/*,.pdf" style="display:none" onchange="handleAttachFile(this)"/>
          <div id="input-wrap">
            <div class="input-field-wrap">
              <textarea id="user-input" placeholder="Message AI Studio Pro… (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
            </div>
            <button id="attach-btn" onclick="document.getElementById('attach-file-input').click()" title="Attach file (image or PDF)">📎</button>
            <button id="enhance-btn" onclick="toggleImgEnhance()" title="Auto-enhance image prompts">✨</button>
            <button id="voice-btn" onclick="toggleVoice()" title="Voice input">🎤</button>
            <button id="stop-btn" onclick="stopGeneration()" title="Stop">⏹</button>
            <button id="send-btn" onclick="sendMessage()" title="Send">➤</button>
          </div>
          <div class="input-hint">Enter ↵ send &nbsp;·&nbsp; Shift+Enter new line &nbsp;·&nbsp; 📎 attach file &nbsp;·&nbsp; 🎤 voice</div>
        </div>
      </div>

      <div id="tool-panel">
        <div id="tool-panel-header">
          <div id="tool-panel-title">Tool</div>
          <button id="close-panel" onclick="closeTool()">✕</button>
        </div>
        <div id="tool-panel-body"></div>
      </div>
    </div>
  </div>
</div>

<script>
let chatHistory = [], currentStream = null, isGenerating = false, isRecording = false;
let imgEnhanceOn = localStorage.getItem('imgEnhance') !== 'false';
let mediaRecorder = null, recognition = null, currentTool = 'chat';
let lastHtml = '', lastCode = '', statsInterval = null;
let attachedImageB64 = null, attachedAspectRatio = '16:9';
let extractedPdfText = null, extractedPdfFilename = null;

document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('chatHistory');
  if (saved) {
    try {
      chatHistory = JSON.parse(saved);
      chatHistory.forEach(msg => {
        if (msg.content && msg.content.trim()) {
          if (msg.role === 'user') addMsg('user', msg.content);
          else addMsg('ai', msg.content);
        }
      });
    } catch(e) { console.error('Failed to load chat history', e); }
  }
  
  loadModels();
  startStats();
  setupDragDrop();
  setupAutoResize();
  setupKeyboard();
  _syncEnhanceBtn();
});

function saveChatHistory() {
  localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
}

const MODEL_LABELS = {
  'poolside/laguna-m.1:free': 'Laguna M.1 (free) — Agentic Beast',
  'qwen/qwen3.6-plus': 'Qwen 3.6 Plus — Big Brain',
  'qwen/qwen3.6-flash': 'Qwen 3.6 Flash — Fast & Smart',
  'meta-llama/llama-4-scout:free': 'Llama 4 Scout (free) — fast',
  'meta-llama/llama-4-maverick:free': 'Llama 4 Maverick (free) — vision',
  'deepseek/deepseek-v3:free': 'DeepSeek V3 (free) — reasoning',
  'deepseek/deepseek-v4-flash:free': 'DeepSeek V4 Flash (free)',
  'openai/gpt-oss-120b:free': 'GPT-OSS 120B (free)',
};

async function loadModels() {
  try {
    const r = await fetch('/models');
    const data = await r.json();
    const sel = document.getElementById('model-select');
    sel.innerHTML = '';
    const ordered = Object.keys(MODEL_LABELS);
    const rest = (data.models || []).filter(m => !m.includes('image') && !ordered.includes(m));
    [...ordered, ...rest].forEach(m => {
      const o = document.createElement('option');
      o.value = m;
      o.textContent = MODEL_LABELS[m] || m.split('/').pop();
      sel.appendChild(o);
    });
    
    if (!data.models.includes('poolside/laguna-m.1:free')) {
      const o = document.createElement('option');
      o.value = 'poolside/laguna-m.1:free';
      o.textContent = MODEL_LABELS['poolside/laguna-m.1:free'];
      sel.appendChild(o);
    }

    sel.value = 'poolside/laguna-m.1:free';
    
  } catch(e) { 
    console.warn('Could not load models', e); 
    const sel = document.getElementById('model-select');
    sel.innerHTML = '<option value="poolside/laguna-m.1:free">Laguna M.1 (free) — Agentic Beast</option>';
  }
}

function getModel() { 
  const sel = document.getElementById('model-select');
  return sel ? sel.value : 'poolside/laguna-m.1:free'; 
}

function setupKeyboard() {
  const inp = document.getElementById('user-input');
  inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
}
function setupAutoResize() {
  const ta = document.getElementById('user-input');
  ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 140) + 'px'; });
}

function shortModelName(id) {
  if (!id) return 'Unknown';
  const label = MODEL_LABELS[id];
  if (label) return label.split(' — ')[0].replace(' (free)', '');
  return id.split('/').pop().replace(':free', '').replace(/-/g, ' ');
}
function detectAspectRatio(w, h) { if (h > w * 1.2) return '9:16'; if (w > h * 1.2) return '16:9'; return '1:1'; }
function isVideoRequest(msg) { const lower = msg.toLowerCase(); const kws = ['generate a video','create a video','make a video','make me a video','generate video','create video','video of','animate','animation']; return kws.some(k => lower.includes(k)); }

function handleAttachFile(input) {
  const file = input.files[0];
  if (!file) return;
  
  if (file.name.toLowerCase().endsWith('.pdf')) {
    handlePdfUpload(file);
    input.value = '';
    return;
  }
  
  if (file.size > 8 * 1024 * 1024) { 
    toast('Image too large — please use an image under 8 MB', 'error'); 
    input.value = ''; 
    return; 
  }
  
  const reader = new FileReader();
  reader.onload = () => {
    attachedImageB64 = reader.result;
    const img = new Image();
    img.onload = () => { attachedAspectRatio = detectAspectRatio(img.naturalWidth, img.naturalHeight); };
    img.src = attachedImageB64;
    document.getElementById('attach-thumb').src = attachedImageB64;
    document.getElementById('attach-label').textContent = file.name;
    document.getElementById('attach-preview').classList.add('visible');
    document.getElementById('attach-btn').classList.add('has-image');
    toast(`Image "${file.name}" attached`, 'success');
  };
  reader.readAsDataURL(file);
  input.value = '';
}

async function handlePdfUpload(file) {
  if (file.size > 20 * 1024 * 1024) { 
    toast('PDF too large — please use a PDF under 20 MB', 'error'); 
    return; 
  }
  
  toast('Uploading and extracting text from PDF...', 'info');
  
  const formData = new FormData();
  formData.append('file', file);
  
  try {
    const response = await fetch('/upload_pdf', {
      method: 'POST',
      body: formData
    });
    
    const data = await response.json();
    
    if (data.error) {
      toast(`Error: ${data.error}`, 'error');
      return;
    }
    
    extractedPdfText = data.text;
    extractedPdfFilename = data.filename;
    
    document.getElementById('attach-thumb').src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzYiIGhlaWdodD0iMzYiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjM2IiBoZWlnaHQ9IjM2IiBmaWxsPSIjZWY0NDQ0Ii8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxMiIgZmlsbD0id2hpdGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5QREY8L3RleHQ+PC9zdmc+';
    document.getElementById('attach-label').textContent = `${data.filename} (${data.pages} pages)`;
    document.getElementById('attach-preview').classList.add('visible');
    document.getElementById('attach-btn').classList.add('has-image');
    
    toast(`✅ PDF uploaded! ${data.pages} pages extracted. Ask me anything about it!`, 'success');
    
  } catch (error) {
    toast(`Failed to upload PDF: ${error.message}`, 'error');
  }
}

function clearAttachment() {
  attachedImageB64 = null; 
  attachedAspectRatio = '16:9';
  extractedPdfText = null;
  extractedPdfFilename = null;
  document.getElementById('attach-thumb').src = '';
  document.getElementById('attach-label').textContent = '';
  document.getElementById('attach-preview').classList.remove('visible');
  document.getElementById('attach-btn').classList.remove('has-image');
}

async function sendMessage() {
  const inp = document.getElementById('user-input');
  const msg = inp.value.trim();
  if (!msg || isGenerating) return;
  inp.value = ''; inp.style.height = 'auto';
  
  let messageWithPdf = msg;
  if (extractedPdfText && msg.trim()) {
    messageWithPdf = `[PDF Content from ${extractedPdfFilename}]:\n\n${extractedPdfText}\n\n---\n\nUser Question: ${msg}`;
    extractedPdfText = null;
    extractedPdfFilename = null;
  }
  
  addMsg('user', msg);
  chatHistory.push({ role: 'user', content: msg });
  saveChatHistory();
  
  const model = getModel();
  isGenerating = true;
  document.getElementById('stop-btn').classList.add('visible');
  document.getElementById('send-btn').style.opacity = '.4';
  const typingId = addTyping();

  if (attachedImageB64 && isVideoRequest(msg)) {
    const imgB64 = attachedImageB64; const aratio = attachedAspectRatio; clearAttachment();
    try {
      const resp = await fetch('/generate_video', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt: msg, image: imgB64, aspect_ratio: aratio }) });
      const data = await resp.json();
      removeTyping(typingId);
      if (data.error) { addMsg('ai', `❌ ${data.error}`); } 
      else {
        const dur = data.duration || '?'; const cost = data.cost || '?';
        const md = `🎬 **Image-to-video complete** (${dur}s · ~$${cost})\n\n![video](${data.video_url})`;
        const el = addMsg('ai', md);
        chatHistory.push({ role: 'assistant', content: md });
        saveChatHistory();
      }
    } catch(err) { removeTyping(typingId); addMsg('ai', `❌ Error: ${err.message}`); }
    doneGenerating(null); return;
  }

  try {
    const url = `/stream_smart_agent?request=${encodeURIComponent(messageWithPdf)}&model=${encodeURIComponent(model)}&img_enhance=${imgEnhanceOn}`;
    const es = new EventSource(url);
    currentStream = es;
    let aiText = '', steps = [], stepsDiv = null;

    es.onmessage = e => {
      const d = JSON.parse(e.data);
      if (d.error) { removeTyping(typingId); addMsg('ai', `❌ ${d.error}`); doneGenerating(es); return; }
      if (d.warning) {
        const w = document.createElement('div'); w.style.cssText = 'font-size:11px;color:var(--muted);padding:2px 8px;margin-bottom:4px'; w.textContent = '⚠ ' + d.warning;
        (stepsDiv || document.getElementById('messages')).appendChild(w); scrollBottom(); return;
      }
      if (d.cost_notice) {
        const cn = document.createElement('div'); cn.style.cssText = 'font-size:11px;color:#f59e0b;padding:2px 8px;margin-bottom:4px'; cn.textContent = '💳 ' + d.cost_notice;
        (stepsDiv || document.getElementById('messages')).appendChild(cn); scrollBottom(); return;
      }
      if (d.chain_summary) {
        const cs = document.createElement('div'); cs.style.cssText = 'background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;margin-top:8px;font-size:11px;color:var(--muted)';
        cs.innerHTML = '<b style="color:var(--text)">Completed ' + d.chain_summary.length + ' steps</b> — ' + d.chain_summary.map(s => `<span style="color:var(--accent)">${s.label}</span>`).join(' → ');
        document.getElementById('messages').appendChild(cs); scrollBottom(); return;
      }
      if (d.step_start) {
        if (!stepsDiv) { removeTyping(typingId); stepsDiv = document.createElement('div'); stepsDiv.style.marginBottom = '12px'; document.getElementById('messages').appendChild(stepsDiv); }
        const chip = document.createElement('div'); chip.className = 'step-chip running'; chip.id = `step-${d.step_index}`; chip.innerHTML = `<div class="step-dot"></div>${d.step_start}`;
        stepsDiv.appendChild(chip); scrollBottom(); return;
      }
      if (d.token !== undefined) { removeTyping(typingId); aiText += d.token; updateStreamMsg(typingId, aiText, stepsDiv); return; }
      if (d.result !== undefined) {
        removeTyping(typingId);
        if (steps.length > 0 && stepsDiv) { const chip = stepsDiv.querySelector('.step-chip.running'); if (chip) { chip.classList.remove('running'); chip.classList.add('done'); } }
        aiText += (aiText ? '\n\n' : '') + d.result;
        if (d.html_preview || d.new_html_preview) { const html = d.html_preview || d.new_html_preview; lastHtml = html; aiText += '\n\n✅ Preview available — click **Preview** below'; }
        if (d.refined_code) lastCode = d.refined_code;
        updateStreamMsg(typingId, aiText, stepsDiv);
        if (d.clone_preview) showClonePreview(d.directory);
        return;
      }
      if (d.done) {
        if (aiText) {
          chatHistory.push({ role: 'assistant', content: aiText });
          saveChatHistory();
          
          if (!_streamMsgEl) {
            _streamMsgEl = createMsgEl('ai', '');
            document.getElementById('messages').appendChild(_streamMsgEl);
          }
          const modelUsed = d.model_used || getModel();
          const lbl = document.createElement('button'); 
          lbl.className = 'msg-action-btn';
          lbl.style.cursor = 'default';
          lbl.textContent = '🧠 ' + shortModelName(modelUsed);
          const actions = _streamMsgEl.querySelector('.msg-actions'); 
          if (actions) actions.appendChild(lbl);
          scrollBottom();
        } else if (!stepsDiv) { removeTyping(typingId); addMsg('ai', 'Done.'); }
        doneGenerating(es);
      }
    };
    es.onerror = () => { removeTyping(typingId); if (isGenerating) addMsg('ai', '⚠️ Connection lost. Please try again.'); doneGenerating(es); };
  } catch(err) { removeTyping(typingId); addMsg('ai', `❌ Error: ${err.message}`); doneGenerating(null); }
}

let _streamMsgEl = null;
function updateStreamMsg(id, text, stepsDiv) {
  if (!_streamMsgEl) { _streamMsgEl = createMsgEl('ai', ''); const msgs = document.getElementById('messages'); if (stepsDiv) msgs.insertBefore(_streamMsgEl, null); else msgs.appendChild(_streamMsgEl); }
  const content = _streamMsgEl.querySelector('.msg-content'); content.innerHTML = renderMarkdown(text); scrollBottom();
}
function doneGenerating(es) { if (es) es.close(); currentStream = null; isGenerating = false; _streamMsgEl = null; document.getElementById('stop-btn').classList.remove('visible'); document.getElementById('send-btn').style.opacity = '1'; }

function stopGeneration() { 
  if (currentStream) { currentStream.close(); } 
  doneGenerating(null); 
  
  if (_streamMsgEl) {
    const content = _streamMsgEl.querySelector('.msg-content');
    content.innerHTML += '<br><br><span style="color:var(--muted); font-size:12px; font-style:italic;">⏹ Generation stopped.</span>';
    _streamMsgEl = null; 
  } else {
    addMsg('ai', '⏹ Generation stopped.'); 
  }
}

function addMsg(role, text) { const el = createMsgEl(role, text); document.getElementById('messages').appendChild(el); scrollBottom(); return el; }

function createMsgEl(role, text) {
  const div = document.createElement('div'); div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-avatar">${role === 'user' ? '👤' : '🧠'}</div><div class="msg-body"><div class="msg-role">${role === 'user' ? 'You' : 'AI Studio Pro'}</div><div class="msg-content">${renderMarkdown(text)}</div><div class="msg-actions"><button class="msg-action-btn" onclick="copyMsg(this)">📋 Copy</button>${role === 'ai' ? '<button class="msg-action-btn" onclick="speakMsg(this)">🔊 Speak</button>' : ''}${role === 'ai' && lastHtml ? '<button class="msg-action-btn" onclick="previewLastHtml()">👁 Preview</button>' : ''}</div></div>`;
  return div;
}

function addTyping() {
  const id = 'typing-' + Date.now(); const div = document.createElement('div'); div.className = 'msg ai'; div.id = id;
  div.innerHTML = `<div class="msg-avatar">🧠</div><div class="msg-body"><div class="msg-role">AI Studio Pro</div><div class="msg-content"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  document.getElementById('messages').appendChild(div); scrollBottom(); return id;
}
function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }
function scrollBottom() { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }

function renderMarkdown(text) {
  if (!text) return '';
  let h = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const safeTags = ['audio', 'video', 'source', 'model-viewer', 'button', 'div', 'span', 'script', 'style', 'iframe', 'canvas'];
  safeTags.forEach(tag => {
    const openRegex = new RegExp(`&lt;${tag}([^&]*)&gt;`, 'gi'); const closeRegex = new RegExp(`&lt;/${tag}&gt;`, 'gi');
    h = h.replace(openRegex, `<${tag}$1>`); h = h.replace(closeRegex, `</${tag}>`);
  });
  h = h.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => { const langClass = lang ? ` class="language-${lang}"` : ''; return `<pre><button class="code-copy-btn" onclick="copyCode(this)">📋 Copy</button><code${langClass}>${code.trim()}</code></pre>`; });
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>'); h = h.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  h = h.replace(/!\[([^\]]*)\]\(((?:https?:\/\/|\/)[^\)]+)\)/g, (_, alt, url) => {
    const filename = url.split('/').pop().split('?')[0] || 'media';
    if (/\.mp4(\?|$)/i.test(url)) { return `<div class="generated-media-wrap"><video controls autoplay style="max-width:100%;border-radius:8px;background:#000"><source src="${url}" type="video/mp4">Your browser does not support the video tag.</video><div class="media-actions"><a href="${url}" download="${filename}" class="media-action-btn">⬇ Download MP4</a><a href="${url}" target="_blank" class="media-action-btn">🔗 Open</a><button onclick="copyImageUrl('${url}')" class="media-action-btn">📋 Copy Link</button></div></div>`; }
    return `<div class="generated-media-wrap"><img src="${url}" alt="${alt}" style="max-width:100%;border-radius:8px" onclick="window.open('${url}','_blank')"/><div class="media-actions"><a href="${url}" download="${filename}" class="media-action-btn">⬇ Download</a><a href="${url}" target="_blank" class="media-action-btn">🔍 Open Full Size</a><button onclick="copyImageUrl('${url}')" class="media-action-btn">📋 Copy Link</button></div></div>`;
  });
  h = h.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  h = h.replace(/^#{3} (.+)$/gm, '<h3 style="margin:.5em 0 .25em;font-size:14px">$1</h3>');
  h = h.replace(/^#{2} (.+)$/gm, '<h2 style="margin:.5em 0 .25em;font-size:15px">$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1 style="margin:.5em 0 .25em;font-size:17px">$1</h1>');
  h = h.replace(/^\|(.+)\|\s*\n\|[-|\s:]+\|\s*\n((?:\|.+\|\s*\n?)*)/gm, (match, header, body) => {
    const headers = header.split('|').map(h => h.trim()).filter(h => h); const rows = body.trim().split('\n').map(row => row.split('|').map(c => c.trim()).filter(c => c));
    let table = '<table><thead><tr>'; headers.forEach(h => table += `<th>${h}</th>`); table += '</tr></thead><tbody>';
    rows.forEach(row => { table += '<tr>'; row.forEach(cell => table += `<td>${cell}</td>`); table += '</tr>'; }); table += '</tbody></table>'; return table;
  });
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  h = h.replace(/^- (.+)$/gm, '<li style="margin:.2em 0">$1</li>');
  h = h.replace(/(<li[^>]*>.*<\/li>\n?)+/g, s => `<ul style="padding-left:1.5em">${s}</ul>`);
  h = h.replace(/\n{2,}/g, '<br><br>'); h = h.replace(/\n/g, '<br>');
  return h;
}

function applySyntaxHighlighting() { document.querySelectorAll('pre code').forEach(block => { if (!block.classList.contains('hljs')) { hljs.highlightElement(block); } }); }
function copyCode(btn) { const code = btn.nextElementSibling.innerText; navigator.clipboard.writeText(code).then(() => { btn.textContent = '✅ Copied!'; setTimeout(() => btn.textContent = '📋 Copy', 2000); }); }
function copyImageUrl(url) { const fullUrl = url.startsWith('http') ? url : window.location.origin + url; navigator.clipboard.writeText(fullUrl).then(() => toast('Link copied!', 'success')); }
function copyMsg(btn) { const content = btn.closest('.msg-body').querySelector('.msg-content').innerText; navigator.clipboard.writeText(content).then(() => toast('Copied!', 'success')); }
function speakMsg(btn) { const text = btn.closest('.msg-body').querySelector('.msg-content').innerText; const utt = new SpeechSynthesisUtterance(text); utt.rate = 1; utt.pitch = 1; speechSynthesis.speak(utt); }

function previewLastHtml() {
  if (!lastHtml) return;
  const panel = document.getElementById('tool-panel'); const body = document.getElementById('tool-panel-body');
  document.getElementById('tool-panel-title').textContent = '👁 HTML Preview';

function startStats() { fetchStats(); statsInterval = setInterval(fetchStats, 4000); }
async function fetchStats() {
  try { const r = await fetch('/system_stats'); const d = await r.json(); setBar('cpu', d.cpu_percent, `${d.cpu_percent}%`); setBar('ram', d.ram_percent, `${d.ram_used_gb}/${d.ram_total_gb}GB`); if (d.gpu && d.gpu.gpu_percent !== undefined) { document.getElementById('gpu-row').style.display = 'flex'; setBar('gpu', d.gpu.gpu_percent, `${d.gpu.gpu_percent}%`); } } catch(e) {}
}
function setBar(id, pct, label) { const bar = document.getElementById('bar-' + id); const val = document.getElementById('stat-' + id); if (bar) { bar.style.width = pct + '%'; bar.className = 'bar-fill' + (pct > 85 ? ' danger' : pct > 65 ? ' warn' : ''); } if (val) val.textContent = label; }

function toggleVoice() { if (isRecording) { stopVoice(); } else { startVoice(); } }
function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition; if (!SR) { toast('Voice not supported', 'error'); return; }
  recognition = new SR(); recognition.continuous = false; recognition.lang = 'en-US';
  recognition.onresult = e => { document.getElementById('user-input').value = e.results[0][0].transcript; };
  recognition.onend = () => stopVoice(); recognition.start(); isRecording = true; document.getElementById('voice-btn').classList.add('recording');
}
function stopVoice() { if (recognition) { try { recognition.stop(); } catch(e){} } isRecording = false; document.getElementById('voice-btn').classList.remove('recording'); }

function setupDragDrop() {
  const overlay = document.getElementById('drop-overlay');
  document.addEventListener('dragover', e => { e.preventDefault(); overlay.classList.add('active'); });
  document.addEventListener('dragleave', e => { if (!e.relatedTarget) overlay.classList.remove('active'); });
  document.addEventListener('drop', e => {
    e.preventDefault(); overlay.classList.remove('active'); const file = e.dataTransfer?.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const content = reader.result; const inp = document.getElementById('user-input');
      if (file.type.startsWith('image/')) {
        if (file.size > 8 * 1024 * 1024) { toast('Image too large', 'error'); return; }
        attachedImageB64 = content; const _di = new Image(); _di.onload = () => { attachedAspectRatio = detectAspectRatio(_di.naturalWidth, _di.naturalHeight); }; _di.src = content;
        document.getElementById('attach-thumb').src = content; document.getElementById('attach-label').textContent = file.name;
        document.getElementById('attach-preview').classList.add('visible'); document.getElementById('attach-btn').classList.add('has-image');
        toast(`Image "${file.name}" attached`, 'success');
      } else { inp.value = `Here is the content of ${file.name}:\n\n${content.slice(0,3000)}`; toast(`File "${file.name}" loaded`, 'success'); }
    };
    if (file.type.startsWith('image/')) reader.readAsDataURL(file); else reader.readAsText(file);
  });
}

function exportChat(format) {
  document.getElementById('export-menu').classList.remove('open'); let content, filename, mime;
  if (format === 'json') { content = JSON.stringify(chatHistory, null, 2); filename = 'ai-studio-chat.json'; mime = 'application/json'; } 
  else { content = chatHistory.map(m => `**${m.role === 'user' ? 'You' : 'AI Studio'}:**\n${m.content}`).join('\n\n---\n\n'); filename = 'ai-studio-chat.md'; mime = 'text/markdown'; }
  const a = document.createElement('a'); a.href = `data:${mime};charset=utf-8,` + encodeURIComponent(content); a.download = filename; a.click(); toast('Exported!', 'success');
}

function setLoading(btnId, loading, loadText) { const btn = document.getElementById(btnId); if (!btn) return; btn.disabled = loading; if (loading && loadText) btn.textContent = loadText; }
function showResult(containerId, text, type) { const el = document.getElementById(containerId); if (!el) return; el.innerHTML = `<div class="result-box ${type||''}">${text}</div>`; }
function toast(msg, type) { const c = document.getElementById('toast-container'); const div = document.createElement('div'); div.className = `toast ${type||''}`; div.innerHTML = `${type==='success'?'✅':type==='error'?'❌':'ℹ️'} ${msg}`; c.appendChild(div); setTimeout(() => div.remove(), 3500); }
function showModal(title, msg, buttons) {
  document.getElementById('modal-title').textContent = title; document.getElementById('modal-msg').textContent = msg;
  const actions = document.getElementById('modal-actions'); actions.innerHTML = '';
  buttons.forEach(b => { const btn = document.createElement('button'); btn.className = b.cls; btn.textContent = b.label; btn.onclick = () => { document.getElementById('modal-overlay').classList.remove('open'); if (b.action) b.action(); }; actions.appendChild(btn); });
  document.getElementById('modal-overlay').classList.add('open');
}
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('open'); });
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
function _syncEnhanceBtn() { const btn = document.getElementById('enhance-btn'); if (!btn) return; btn.classList.toggle('on', imgEnhanceOn); btn.title = imgEnhanceOn ? 'Image prompt enhancement ON' : 'Image prompt enhancement OFF'; }

observer.observe(document.getElementById('messages'), { childList: true, subtree: true });
